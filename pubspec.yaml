name: orbit
description: "Group calendar & map sharing app"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management — Riverpod 3.x
  flutter_riverpod: ^3.0.0

  # Routing
  go_router: ^16.0.0

  # Firebase (FlutterFire SDK 4.x)
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_messaging: ^16.0.0

  # Map & Location
  google_maps_flutter: ^2.12.0
  geolocator: ^14.0.0
  geocoding: ^4.0.0

  # Calendar UI
  table_calendar: ^3.2.0

  # Deep linking (초대 링크)
  app_links: ^6.4.0

  # Utilities
  intl: ^0.20.0
  uuid: ^4.5.0
  collection: ^1.19.0

  # Crypto / Secure storage (비밀 메모용)
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
